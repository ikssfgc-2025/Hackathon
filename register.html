<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - SFGC Hackathon</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #020412;
            color: white;
            font-family: 'Exo 2', sans-serif;
            overflow-x: hidden;
        }

        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            opacity: 0.5;
        }

        nav {
            position: fixed;
            top: 0; width: 100%; padding: 20px 50px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(2, 4, 18, 0.95);
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 234, 255, 0.3);
        }

        .logo { color: #00eaff; font-family: 'Orbitron'; font-weight: bold; font-size: 20px; text-decoration: none; }

        .container {
            max-width: 700px;
            margin: 120px auto 50px;
            padding: 0 20px;
        }

        .glass-panel {
            background: rgba(2, 4, 18, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 234, 255, 0.3);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(0, 234, 255, 0.1);
        }

        h2 { font-family: 'Orbitron'; color: #00eaff; text-align: center; margin-bottom: 30px; letter-spacing: 2px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #00eaff; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }

        .form-input, select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 234, 255, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        .form-input:focus { border-color: #00eaff; background: rgba(0, 234, 255, 0.05); }

        select option { background: #020412; color: white; }

        .member-block {
            background: rgba(0, 234, 255, 0.03);
            border-left: 3px solid #00eaff;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 0 12px 12px 0;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .payment-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(0, 234, 255, 0.2);
            text-align: center;
        }

        .qr-placeholder {
            background: white;
            padding: 10px;
            display: inline-block;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .qr-placeholder img { width: 180px; height: 180px; display: block; }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #00eaff, #0077ff);
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Orbitron';
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-submit:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 234, 255, 0.5); }

        @media (max-width: 600px) {
            .glass-panel { padding: 20px; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <nav>
        <a href="index.html" class="logo">SFGC HACKATHON</a>
        <a href="events.html" style="color: #00eaff; text-decoration: none; font-size: 14px;">← Back</a>
    </nav>

    <div class="container">
        <div class="glass-panel">
            <h2>REGISTRATION</h2>
            
            <form id="registrationForm">
                <div class="form-group">
                    <label>1. Which event are you choosing?</label>
                    <select id="eventDropdown" required onchange="handleEventChange()">
                        <option value="" disabled selected>-- Choose the correct answer --</option>
                        <option value="24H Hackathon">24H Hackathon (Team Size: 2-4)</option>
                        <option value="Tech Quiz">Tech Quiz (Solo: 1)</option>
                    </select>
                </div>

                <div id="sizeGroup" class="form-group" style="display:none;">
                    <label id="sizeLabel">2. Team Size:</label>
                    <input type="number" id="teamSizeInput" class="form-input" placeholder="Enter number of members" required>
                    <small id="limitHint" style="color: #00eaff; font-size: 11px; margin-top: 5px; display: block;"></small>
                </div>

                <div id="memberFieldsContainer"></div>

                <div id="finalSection" style="display:none;">
                    <div class="form-group">
                        <label>College Name (Common for all):</label>
                        <input type="text" class="form-input" placeholder="Your College / Institution" required>
                    </div>

                    <div class="payment-section">
                        <label>Registration Payment</label>
                        <div class="qr-placeholder">
                            <img src="YOUR_QR_IMAGE_PATH.png" alt="Scan to Pay">
                        </div>
                        <p style="font-size: 12px; opacity: 0.7; margin-bottom: 20px;">Scan QR and pay the specific event fee.<br>Submit the Transaction ID below.</p>
                        
                        <div class="form-group" style="text-align: left;">
                            <label>Transaction ID / UTR:</label>
                            <input type="text" class="form-input" placeholder="Enter 12-digit Transaction ID" required>
                        </div>

                        <button type="submit" class="btn-submit">COMPLETE REGISTRATION</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        const eventDropdown = document.getElementById('eventDropdown');
        const teamSizeInput = document.getElementById('teamSizeInput');
        const memberContainer = document.getElementById('memberFieldsContainer');
        const finalSection = document.getElementById('finalSection');
        const limitHint = document.getElementById('limitHint');

        let minSize = 1;
        let maxSize = 1;

        // 1. AUTO-LOAD EVENT FROM URL
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const eventParam = params.get('event');
            if (eventParam) {
                eventDropdown.value = decodeURIComponent(eventParam);
                handleEventChange();
            }
        };

        // 2. HANDLE EVENT CHOICE
        function handleEventChange() {
            const selected = eventDropdown.value;
            document.getElementById('sizeGroup').style.display = 'block';
            memberContainer.innerHTML = '';
            finalSection.style.display = 'none';
            teamSizeInput.value = '';

            if (selected === "24H Hackathon") {
                minSize = 2; maxSize = 4;
                limitHint.innerText = "Minimum 2 and Maximum 4 members allowed.";
            } else {
                minSize = 1; maxSize = 1;
                limitHint.innerText = "Solo entry only. Please enter 1.";
            }
        }

        // 3. GENERATE DYNAMIC FIELDS
        teamSizeInput.addEventListener('input', () => {
            const size = parseInt(teamSizeInput.value);
            memberContainer.innerHTML = '';
            
            if (size >= minSize && size <= maxSize) {
                finalSection.style.display = 'block';
                for (let i = 1; i <= size; i++) {
                    memberContainer.innerHTML += `
                        <div class="member-block">
                            <h4 style="font-size: 12px; color: #00eaff; margin-bottom: 10px;">MEMBER ${i}</h4>
                            <input type="text" class="form-input" placeholder="Full Name" required style="margin-bottom:10px;">
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                                <input type="tel" class="form-input" placeholder="Phone Number" required>
                                <input type="email" class="form-input" placeholder="Gmail ID" required>
                            </div>
                        </div>
                    `;
                }
            } else {
                finalSection.style.display = 'none';
            }
        });

        // 4. MATRIX BACKGROUND
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, drops;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            drops = Array(Math.floor(width / 20)).fill(1);
        }

        function draw() {
            ctx.fillStyle = "rgba(2, 4, 18, 0.1)";
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = "#00eaff";
            ctx.font = "15px monospace";
            for (let i = 0; i < drops.length; i++) {
                ctx.fillText(Math.floor(Math.random() * 10), i * 20, drops[i] * 20);
                if (drops[i] * 20 > height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }

        init();
        setInterval(draw, 50);
        window.addEventListener('resize', init);

        // Form Submission logic
        document.getElementById('registrationForm').onsubmit = (e) => {
            e.preventDefault();
            alert("Registration data captured! In a real scenario, this would send to your database.");
        };
    </script>
</body>
</html>
