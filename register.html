<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - SFGC Hackathon</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #020412;
            color: white;
            font-family: 'Exo 2', sans-serif;
            overflow-x: hidden;
        }

        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            opacity: 0.5;
        }

        nav {
            position: fixed;
            top: 0; width: 100%; padding: 20px 50px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(2, 4, 18, 0.95);
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 234, 255, 0.3);
        }

        .logo { color: #00eaff; font-family: 'Orbitron'; font-weight: bold; font-size: 20px; text-decoration: none; }

        .container {
            max-width: 700px;
            margin: 120px auto 50px;
            padding: 0 20px;
        }

        .glass-panel {
            background: rgba(2, 4, 18, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 234, 255, 0.3);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(0, 234, 255, 0.1);
        }

        h2 { font-family: 'Orbitron'; color: #00eaff; text-align: center; margin-bottom: 30px; letter-spacing: 2px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #00eaff; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }

        .form-input, select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 234, 255, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        .member-block {
            background: rgba(0, 234, 255, 0.03);
            border-left: 3px solid #00eaff;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 0 12px 12px 0;
        }

        .payment-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(0, 234, 255, 0.2);
            text-align: center;
        }

        .qr-placeholder {
            background: white;
            padding: 10px;
            display: inline-block;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .qr-placeholder img { width: 180px; height: 180px; display: block; }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #00eaff, #0077ff);
            border: none;
            border-radius: 10px;
            color: white;
            font-family: 'Orbitron';
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <nav>
        <a href="index.html" class="logo">SFGC HACKATHON</a>
        <a href="events.html" style="color: #00eaff; text-decoration: none; font-size: 14px;">← Back</a>
    </nav>

    <div class="container">
        <div class="glass-panel">
            <h2>REGISTRATION</h2>
            
            <form id="registrationForm">
                <div class="form-group">
                    <label>1. Which event are you choosing?</label>
                    <select id="eventDropdown" required onchange="handleEventChange()">
                        <option value="" disabled selected>-- Select Event --</option>
                        <option value="24H Hackathon">24H Hackathon (Team Size: 2-4)</option>
                        <option value="Tech Quiz">Tech Quiz (Solo: 1)</option>
                    </select>
                </div>

                <div id="sizeGroup" class="form-group" style="display:none;">
                    <label id="sizeLabel">2. Team Size:</label>
                    <input type="number" id="teamSizeInput" class="form-input" placeholder="Enter number of members" required>
                    <small id="limitHint" style="color: #00eaff; font-size: 11px; margin-top: 5px; display: block;"></small>
                </div>

                <div id="memberFieldsContainer"></div>

                <div id="finalSection" style="display:none;">
                    <div class="form-group">
                        <label>College Name:</label>
                        <input type="text" id="collegeName" class="form-input" placeholder="Your College / Institution" required>
                    </div>

                    <div class="payment-section">
                        <label>Registration Payment</label>
                        <div class="qr-placeholder">
                            <img src="qr_code.png" alt="Scan to Pay">
                        </div>
                        <div class="form-group" style="text-align: left;">
                            <label>Transaction ID / UTR:</label>
                            <input type="text" id="txnId" class="form-input" placeholder="Enter 12-digit ID" required>
                        </div>

                        <button type="submit" id="submitBtn" class="btn-submit">COMPLETE REGISTRATION</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Your NEW Web App URL
        const scriptURL = 'https://script.google.com/macros/s/AKfycby_S-i7h8TPzLX-fFq-TGTy1X7rsXFnBuwpSQxNiUKg6FACxfrDRDt-gxp6B_ODrlIl/exec';
        
        const eventDropdown = document.getElementById('eventDropdown');
        const teamSizeInput = document.getElementById('teamSizeInput');
        const memberContainer = document.getElementById('memberFieldsContainer');
        const finalSection = document.getElementById('finalSection');
        const limitHint = document.getElementById('limitHint');
        const submitBtn = document.getElementById('submitBtn');

        let minSize = 1, maxSize = 1;

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const eventParam = params.get('event');
            if (eventParam) {
                eventDropdown.value = decodeURIComponent(eventParam);
                handleEventChange();
            }
        };

        function handleEventChange() {
            const selected = eventDropdown.value;
            document.getElementById('sizeGroup').style.display = 'block';
            memberContainer.innerHTML = '';
            finalSection.style.display = 'none';
            teamSizeInput.value = '';

            if (selected === "24H Hackathon") {
                minSize = 2; maxSize = 4;
                limitHint.innerText = "Min 2, Max 4 members.";
            } else {
                minSize = 1; maxSize = 1;
                limitHint.innerText = "Solo entry only.";
            }
        }

        teamSizeInput.addEventListener('input', () => {
            const size = parseInt(teamSizeInput.value);
            memberContainer.innerHTML = '';
            if (size >= minSize && size <= maxSize) {
                finalSection.style.display = 'block';
                for (let i = 1; i <= size; i++) {
                    memberContainer.innerHTML += `
                        <div class="member-block">
                            <h4 style="font-size: 12px; color: #00eaff; margin-bottom: 10px;">MEMBER ${i}</h4>
                            <input type="text" class="m-name form-input" placeholder="Name" required style="margin-bottom:10px;">
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                                <input type="tel" class="m-phone form-input" placeholder="Phone" required>
                                <input type="email" class="m-email form-input" placeholder="Email" required>
                            </div>
                        </div>`;
                }
            } else {
                finalSection.style.display = 'none';
            }
        });

        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerText = "Saving to Excel...";

            let membersArr = [];
            document.querySelectorAll('.member-block').forEach((b, i) => {
                const n = b.querySelector('.m-name').value;
                const p = b.querySelector('.m-phone').value;
                const em = b.querySelector('.m-email').value;
                membersArr.push(`[M${i+1}: ${n}, ${p}, ${em}]`);
            });

            const data = {
                event: eventDropdown.value,
                teamSize: teamSizeInput.value,
                college: document.getElementById('collegeName').value,
                transactionId: document.getElementById('txnId').value,
                members: membersArr.join(" | ")
            };

            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(() => {
                alert("Success! Data sent to Excel.");
                window.location.href = "index.html";
            })
            .catch(err => {
                alert("Error: " + err.message);
                submitBtn.disabled = false;
                submitBtn.innerText = "COMPLETE REGISTRATION";
            });
        });

        // Background Animation
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, drops;
        function init() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; drops = Array(Math.floor(w / 20)).fill(1); }
        function draw() { ctx.fillStyle = "rgba(2, 4, 18, 0.1)"; ctx.fillRect(0, 0, w, h); ctx.fillStyle = "#00eaff"; ctx.font = "15px monospace"; drops.forEach((y, i) => { ctx.fillText(Math.floor(Math.random() * 10), i * 20, y * 20); if (y * 20 > h && Math.random() > 0.975) drops[i] = 0; drops[i]++; }); }
        init(); setInterval(draw, 50); window.onresize = init;
    </script>
</body>
</html>
