<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Committee - SFGC Hackathon 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #020412;
            color: white;
            font-family: 'Georgia', serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(2, 4, 18, 0.95);
            z-index: 1000;
            font-family: 'Exo 2', sans-serif;
            border-bottom: 1px solid rgba(0, 234, 255, 0.3);
        }

        .logo {
            color: #00eaff;
            font-weight: bold;
            font-size: 24px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-links a {
            color: #cfefff;
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #00eaff;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border: 2px solid #00eaff;
            border-radius: 8px;
            background: rgba(0, 234, 255, 0.08);
            backdrop-filter: blur(6px);
            box-shadow: 0 0 15px rgba(0, 234, 255, 0.5);
            transition: 0.3s ease;
        }

        .hamburger:hover {
            transform: scale(1.08);
            box-shadow: 0 0 25px #00eaff;
        }

        .hamburger div {
            width: 20px;
            height: 2.5px;
            background: #00eaff;
            margin: 3px 0;
            border-radius: 4px;
            transition: 0.3s;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            padding: 120px 20px 60px;
        }

        .sub-section {
            background: rgba(0, 234, 255, 0.05);
            border: 1px solid rgba(0, 234, 255, 0.2);
            border-left: 5px solid #00eaff;
            padding: 40px;
            border-radius: 15px;
            margin-bottom: 60px;
            backdrop-filter: blur(8px);
            text-align: center;
        }

        .sub-section h2 {
            font-family: 'Exo 2', sans-serif;
            color: #00eaff;
            font-size: 32px;
            margin-bottom: 20px;
        }

        .committee-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .committee-member {
            background: rgba(0, 234, 255, 0.1);
            border: 1px solid #00eaff;
            border-radius: 12px;
            padding: 25px;
            width: 250px;
        }

        .committee-member h3 {
            font-family: 'Exo 2', sans-serif;
            color: #00eaff;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .committee-member p {
            font-family: 'Georgia', serif;
            color: #cfefff;
            font-size: 15px;
        }

        footer {
            text-align: center;
            padding: 40px;
            border-top: 1px solid rgba(0, 234, 255, 0.2);
            font-size: 14px;
        }

        footer p {
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            nav {
                padding: 15px 20px;
            }

            .logo {
                font-size: 18px;
            }

            .nav-links {
                display: none;
                position: absolute;
                top: 65px;
                right: 15px;
                background: rgba(2, 4, 18, 0.98);
                border: 1px solid #00eaff;
                border-radius: 12px;
                padding: 20px;
                flex-direction: column;
                gap: 25px;
                width: 200px;
                box-shadow: 0 0 20px rgba(0, 234, 255, 0.4);
            }

            .nav-links.active {
                display: flex;
            }

            .nav-links a {
                font-size: 16px;
            }

            .hamburger {
                display: flex;
            }

            .container {
                padding: 100px 15px 40px;
            }

            .sub-section {
                padding: 30px;
                margin-bottom: 40px;
            }

            .sub-section h2 {
                font-size: 24px;
            }

            .committee-list {
                flex-direction: column;
                align-items: center;
            }

            .committee-member {
                width: 100%;
                max-width: 350px;
            }

            footer {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <nav>
        <div class="logo">SFGC HACKATHON</div>
        <div class="nav-links" id="nav-links">
            <a href="index.html">Home</a>
            <a href="events.html">Events</a>
            <a href="about.html">About Us</a>
            <a href="committee.html" class="active">Committee</a>
            <a href="reach.html">Reach Us</a>
        </div>
        <div class="hamburger" id="hamburger">
            <div></div>
            <div></div>
            <div></div>
        </div>
    </nav>

    <div class="container">
        <div class="sub-section">
            <h2>Committee Members</h2>
            <div class="committee-list">
                <div class="committee-member">
                    <h3>Dr.abc</h3>
                    <p>Principal</p>
                </div>
                <div class="committee-member">
                    <h3>Prof.xyz</h3>
                    <p>HOD - Computer Science</p>
                </div>
                <div class="committee-member">
                    <h3>Prof.pqr</h3>
                    <p>Event Coordinator</p>
                </div>
                <div class="committee-member">
                    <h3>Prof.mno</h3>
                    <p>Technical Head</p>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>© All Copyrights Reserved 2026-27</p>
        <p>SFGC IKS FORUM - SRF INDIA</p>
    </footer>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, drops;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            drops = Array(Math.floor(width / 20)).fill(1);
        }

        function draw() {
            ctx.fillStyle = "rgba(2, 4, 18, 0.1)";
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = "#00eaff";
            ctx.font = "15px monospace";
            for (let i = 0; i < drops.length; i++) {
                ctx.fillText(Math.floor(Math.random() * 10), i * 20, drops[i] * 20);
                if (drops[i] * 20 > height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        init();
        setInterval(draw, 50);
        
        window.addEventListener('resize', function() {
            init();
        });

        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('nav-links');
        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });
    </script>
</body>
</html>
